spring:
  application:
    name: aws-member-profile-api

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO

cloud:
  aws:
    region:
      static: ap-northeast-2
    s3:
      bucket: ${S3_BUCKET_NAME:local-test-bucket}