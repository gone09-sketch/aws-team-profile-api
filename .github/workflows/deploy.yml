name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build
        env:
          SPRING_PROFILES_ACTIVE: test
          AWS_REGION: ap-northeast-2
          AWS_DEFAULT_REGION: ap-northeast-2
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          CLOUD_AWS_S3_BUCKET: test-bucket

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ vars.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ vars.DOCKER_IMAGE }}:latest .

      - name: Push Docker image
        run: docker push ${{ vars.DOCKER_IMAGE }}:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ vars.DOCKER_IMAGE }}:latest

            docker stop ${{ vars.CONTAINER_NAME }} || true
            docker rm ${{ vars.CONTAINER_NAME }} || true

            docker run -d \
              --name ${{ vars.CONTAINER_NAME }} \
              -p 8080:8080 \
              --restart unless-stopped \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e AWS_REGION=ap-northeast-2 \
              -e AWS_DEFAULT_REGION=ap-northeast-2 \
              -e SPRING_CLOUD_AWS_PARAMETERSTORE_REGION=ap-northeast-2 \
              ${{ vars.DOCKER_IMAGE }}:latest